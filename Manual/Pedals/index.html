<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedal Drill · Audio Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161f;
    --border: #1e2230;
    --clutch: #38bdf8;
    --brake: #f87171;
    --gas: #4ade80;
    --combo: #fbbf24;
    --text: #e2e8f0;
    --muted: #4a5568;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .card {
    width: 100%;
    max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 36px 32px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--clutch), var(--brake), var(--gas));
  }

  .header { text-align: center; margin-bottom: 36px; }

  .eyebrow { font-size: 10px; letter-spacing: 5px; color: var(--muted); margin-bottom: 8px; }

  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px; font-weight: 800;
    letter-spacing: 2px; line-height: 1; color: #fff;
  }

  h1 span { color: var(--gas); }

  .section-label { font-size: 9px; letter-spacing: 4px; color: var(--muted); margin-bottom: 12px; display: block; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .control-group { display: flex; flex-direction: column; gap: 8px; }
  .control-group.full { grid-column: 1 / -1; }

  input[type=range] { -webkit-appearance: none; width: 100%; height: 2px; background: var(--border); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #fff; border-radius: 50%; cursor: pointer; }

  .range-row { display: flex; align-items: center; gap: 12px; }
  .range-val { font-size: 13px; color: #fff; min-width: 38px; text-align: right; }

  .check-group { display: flex; flex-direction: column; gap: 8px; }
  .check-item { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
  .check-item input { display: none; }

  .check-box {
    width: 16px; height: 16px;
    border: 1px solid var(--muted); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }

  .check-item input:checked + .check-box { border-color: var(--gas); background: var(--gas); }

  .check-box::after {
    content: ''; width: 8px; height: 5px;
    border-left: 2px solid #000; border-bottom: 2px solid #000;
    transform: rotate(-45deg) translateY(-1px); display: none;
  }

  .check-item input:checked + .check-box::after { display: block; }
  .check-label { font-size: 12px; color: var(--text); letter-spacing: 1px; }
  .check-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }

  .preview-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 2px;
    padding: 14px 16px; margin-bottom: 24px; min-height: 52px;
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
  }

  .preview-tag { font-size: 10px; letter-spacing: 2px; padding: 3px 8px; border-radius: 2px; border: 1px solid; }

  .tag-CLUTCH { color: var(--clutch); border-color: var(--clutch); background: rgba(56,189,248,0.07); }
  .tag-BRAKE  { color: var(--brake);  border-color: var(--brake);  background: rgba(248,113,113,0.07); }
  .tag-GAS    { color: var(--gas);    border-color: var(--gas);    background: rgba(74,222,128,0.07); }
  .tag-COMBO  { color: var(--combo);  border-color: var(--combo);  background: rgba(251,191,36,0.07); }

  .preview-more { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  .btn-row { display: flex; gap: 12px; }

  .btn {
    flex: 1; padding: 14px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; letter-spacing: 3px;
    border-radius: 2px; border: none;
    cursor: pointer; transition: all 0.15s;
  }

  .btn-primary { background: #fff; color: #000; }
  .btn-primary:hover { background: #e2e8f0; }
  .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  .progress-wrap { margin-top: 20px; display: none; }
  .progress-wrap.visible { display: block; }

  .progress-bar-bg { height: 2px; background: var(--border); overflow: hidden; margin-bottom: 10px; }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--clutch), var(--gas));
    width: 0%; transition: width 0.2s;
  }

  .progress-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-align: center; }

  .foot-guide { display: flex; justify-content: space-around; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
  .foot-col { text-align: center; }
  .foot-label { font-size: 8px; letter-spacing: 3px; color: var(--muted); margin-bottom: 8px; }
  .foot-pedal { font-size: 10px; letter-spacing: 2px; margin: 4px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="eyebrow">MANUAL TRANSMISSION TRAINER</div>
    <h1>PEDAL <span>AUDIO</span> DRILL</h1>
  </div>

  <div class="controls">
    <!-- Pedals -->
    <div class="control-group">
      <label class="section-label">INCLUDE PEDALS</label>
      <div class="check-group">
        <label class="check-item">
          <input type="checkbox" id="chk-clutch" checked>
          <span class="check-box"></span>
          <span class="check-label"><span class="check-dot" style="background:var(--clutch)"></span>CLUTCH</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="chk-brake" checked>
          <span class="check-box"></span>
          <span class="check-label"><span class="check-dot" style="background:var(--brake)"></span>BRAKE</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="chk-gas" checked>
          <span class="check-box"></span>
          <span class="check-label"><span class="check-dot" style="background:var(--gas)"></span>ACCELERATOR</span>
        </label>
        <label class="check-item">
          <input type="checkbox" id="chk-combos">
          <span class="check-box"></span>
          <span class="check-label"><span class="check-dot" style="background:var(--combo)"></span>COMBOS</span>
        </label>
      </div>
    </div>

    <!-- Settings -->
    <div class="control-group">
      <label class="section-label">SETTINGS</label>

      <label class="section-label" style="margin-top:4px">COMMANDS</label>
      <div class="range-row">
        <input type="range" id="rng-count" min="10" max="60" value="20" step="5">
        <span class="range-val" id="val-count">20</span>
      </div>

      <label class="section-label" style="margin-top:8px">PAUSE (SEC)</label>
      <div class="range-row">
        <input type="range" id="rng-pause" min="0.1" max="5" value="1" step="0.1">
        <span class="range-val" id="val-pause">1s</span>
      </div>

      <label class="section-label" style="margin-top:8px">VOICE SPEED</label>
      <div class="range-row">
        <input type="range" id="rng-speed" min="0.5" max="1.3" value="0.85" step="0.05">
        <span class="range-val" id="val-speed">0.85×</span>
      </div>
    </div>

    <!-- Intro/outro -->
    <div class="control-group full">
      <label class="section-label">OPTIONS</label>
      <div class="check-group" style="flex-direction:row; flex-wrap:wrap; gap:16px">
        <label class="check-item">
          <input type="checkbox" id="chk-intro" checked>
          <span class="check-box"></span>
          <span class="check-label">COUNTDOWN INTRO</span>
        </label>
<label class="check-item">
          <input type="checkbox" id="chk-outro" checked>
          <span class="check-box"></span>
          <span class="check-label">END MESSAGE</span>
        </label>
      </div>
    </div>
  </div>

  <!-- Preview -->
  <label class="section-label">SEQUENCE PREVIEW</label>
  <div class="preview-box" id="preview"></div>

  <hr class="divider">

  <div class="btn-row">
    <button class="btn btn-secondary" onclick="regeneratePreview()">SHUFFLE</button>
    <button class="btn btn-primary" id="btn-generate" onclick="generateAudio()">START DRILL</button>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label">SYNTHESIZING...</div>
  </div>

  <div class="foot-guide">
    <div class="foot-col">
      <div class="foot-label">LEFT FOOT</div>
      <div class="foot-pedal" style="color:var(--clutch)">CLUTCH</div>
    </div>
    <div class="foot-col">
      <div class="foot-label">RIGHT FOOT</div>
      <div class="foot-pedal" style="color:var(--brake)">BRAKE</div>
      <div class="foot-pedal" style="color:var(--gas)">ACCELERATOR</div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let sequence = [];

const COMBOS = [
  "CLUTCH AND BRAKE",
  "CLUTCH AND ACCELERATOR",
];

function getPool() {
  const pool = [];
  if (document.getElementById('chk-clutch').checked) pool.push('CLUTCH');
  if (document.getElementById('chk-brake').checked)  pool.push('BRAKE');
  if (document.getElementById('chk-gas').checked)    pool.push('ACCELERATOR');
  if (document.getElementById('chk-combos').checked) pool.push(...COMBOS);
  return pool.length ? pool : ['CLUTCH', 'BRAKE', 'GAS'];
}

function buildSequence() {
  const pool = getPool();
  const count = parseInt(document.getElementById('rng-count').value);
  const seq = [];
  let last = null;
  for (let i = 0; i < count; i++) {
    let pick;
    do { pick = pool[Math.floor(Math.random() * pool.length)]; } while (pick === last && pool.length > 1);
    const repsPool = [1,1,1,2,2,2,3,3,3,4,5];
    const reps = repsPool[Math.floor(Math.random() * repsPool.length)];
    seq.push({ cmd: pick, reps });
    last = pick;
  }
  return seq;
}

function tagClass(cmd) {
  if (cmd === 'CLUTCH') return 'tag-CLUTCH';
  if (cmd === 'BRAKE')  return 'tag-BRAKE';
  if (cmd === 'ACCELERATOR') return 'tag-GAS';
  return 'tag-COMBO';
}

function renderPreview() {
  const box = document.getElementById('preview');
  box.innerHTML = '';
  const show = sequence.slice(0, 12);
  show.forEach(({ cmd, reps }) => {
    const tag = document.createElement('span');
    tag.className = `preview-tag ${tagClass(cmd)}`;
    tag.textContent = reps > 1 ? `${cmd} x${reps}` : cmd;
    box.appendChild(tag);
  });
  if (sequence.length > 12) {
    const more = document.createElement('span');
    more.className = 'preview-more';
    more.textContent = `+${sequence.length - 12} more`;
    box.appendChild(more);
  }
}

function regeneratePreview() {
  sequence = buildSequence();
  renderPreview();
}

// ── Range inputs ───────────────────────────────────────────────────────
document.getElementById('rng-count').addEventListener('input', e => {
  document.getElementById('val-count').textContent = e.target.value;
  regeneratePreview();
});
document.getElementById('rng-pause').addEventListener('input', e => {
  document.getElementById('val-pause').textContent = e.target.value + 's';
});
document.getElementById('rng-speed').addEventListener('input', e => {
  document.getElementById('val-speed').textContent = parseFloat(e.target.value).toFixed(1) + '×';
});

['chk-clutch','chk-brake','chk-gas','chk-combos'].forEach(id => {
  document.getElementById(id).addEventListener('change', regeneratePreview);
});

// ── Live playback via speechSynthesis with exact timed gaps ──────────────

let drillRunning = false;
let drillTimeouts = [];

function speak(text, rate) {
  return new Promise((resolve) => {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = rate;
    utter.volume = 1;
    utter.onend = () => resolve();
    utter.onerror = () => resolve();
    window.speechSynthesis.speak(utter);
  });
}

function sleep(ms) {
  return new Promise((resolve) => {
    const t = setTimeout(resolve, ms);
    drillTimeouts.push(t);
  });
}

function stopDrill() {
  drillRunning = false;
  window.speechSynthesis.cancel();
  drillTimeouts.forEach(clearTimeout);
  drillTimeouts = [];
}

async function generateAudio() {
  if (drillRunning) {
    stopDrill();
    const btn = document.getElementById('btn-generate');
    btn.textContent = 'START DRILL';
    btn.style.background = '#fff';
    btn.style.color = '#000';
    document.getElementById('progress-wrap').classList.remove('visible');
    return;
  }

  drillRunning = true;
  const btn = document.getElementById('btn-generate');
  btn.textContent = 'STOP DRILL';
  btn.style.background = 'transparent';
  btn.style.color = '#f87171';
  btn.style.border = '1px solid #f87171';

  const progressWrap = document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressLabel = document.getElementById('progress-label');
  progressWrap.classList.add('visible');

  const pauseSec = parseFloat(document.getElementById('rng-pause').value);
  const speed = parseFloat(document.getElementById('rng-speed').value);
  const withIntro = document.getElementById('chk-intro').checked;
  const withOutro = document.getElementById('chk-outro').checked;

  const script = [];
  if (withIntro) {
    script.push({ text: 'Pedal drill starting in... 3', pauseMs: 1000, isCmd: false });
    script.push({ text: '2', pauseMs: 1000, isCmd: false });
    script.push({ text: '1', pauseMs: 1000, isCmd: false });
    script.push({ text: 'Go', pauseMs: 500, isCmd: false });
  }
  const totalCmds = sequence.reduce((s, { reps }) => s + reps, 0);
  sequence.forEach(({ cmd, reps }) => {
    for (let r = 0; r < reps; r++) {
      script.push({ text: cmd, pauseMs: pauseSec * 1000, isCmd: true, reps, repNum: r + 1 });
    }
  });
  if (withOutro) script.push({ text: 'Drill complete. Great work!', pauseMs: 0, isCmd: false });

  const total = totalCmds;
  let cmdCount = 0;

  for (let i = 0; i < script.length; i++) {
    if (!drillRunning) break;
    const item = script[i];
    const spokenText = item.text;
    const pauseMs = item.pauseMs;
    const isCmd = item.isCmd;
    const reps = item.reps;
    const repNum = item.repNum;

    if (isCmd) {
      cmdCount++;
      progressBar.style.width = `${Math.round((cmdCount / total) * 100)}%`;
      const repLabel = reps > 1 ? `  (${repNum}/${reps})` : '';
      progressLabel.textContent = `${spokenText}${repLabel}  ·  ${cmdCount} / ${total}`;
    } else {
      progressLabel.textContent = spokenText.toUpperCase();
    }

    await speak(spokenText, speed);
    if (!drillRunning) break;
    if (pauseMs > 0) await sleep(pauseMs);
  }

  if (drillRunning) {
    progressBar.style.width = '100%';
    progressLabel.textContent = 'DRILL COMPLETE';
  }

  drillRunning = false;
  btn.textContent = 'START DRILL';
  btn.style.background = '#fff';
  btn.style.color = '#000';
  btn.style.border = 'none';
}

// ── Init ───────────────────────────────────────────────────────────────
regeneratePreview();
</script>
</body>
</html>
